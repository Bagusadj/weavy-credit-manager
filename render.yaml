services:
  - type: web
    name: weavy-credit-manager
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    disk:
      name: data
      mountPath: /opt/render/project/backend/data
      sizeGB: 1